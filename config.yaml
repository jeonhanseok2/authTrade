risk:
  daily_loss_limit_pct: 0.02
  per_trade_risk_pct: 0.01         # ATR 사이징: 거래당 계좌의 1% 리스크
  atr_multiplier: 2.0              # 손절 거리 = ATR × multiplier
  stop_loss_pct: 0.05              # 기본 손절 -5%
  take_profit_pct: 0.10            # 1차 익절 +10%
  trail_after_profit_pct: 0.10     # +10% 도달 시 트레일링 가동
  trailing_stop_pct: 0.02          # 트레일링 스탑 2%
  eod_exit_minutes_before_close: 15  # 장 마감 15분 전 인트라데이 포지션 청산
  rsi_overbought_exit: 80.0        # RSI >= 80 → 모멘텀 소진 청산

engine:
  poll_seconds: 60
  trade_window:
    start_minutes_after_open: 5
    end_minutes_before_close: 5
  skip_calls_when_market_closed: true
  deadzone:
    enabled: true
    start_hour: 11
    start_min: 30
    end_hour: 13
    end_min: 0

regime:
  vix_filter_enabled: true
  vix_max_entry: 30.0              # VIX >= 30 시 신규 진입 차단 (청산은 정상 실행)

notify:
  telegram:
    enabled: true
  gpt:
    enabled: true

universe:
  watchlist_file: watchlists/symbols.txt
  fallback_symbols: ["AAPL","MSFT","NVDA","TSLA","AMD","META","AMZN","GOOGL","NFLX","SPY"]

# ── 버킷 1: 가치주 장기투자 ───────────────────────────────────────────
# 초기 공격적 운용: 10% (안전망 수준만 유지)
# 계좌 $25,000 도달 시 30%로 상향 권장
value_long:
  watchlist_file: watchlists/value_symbols.txt
  bucket_pct: 0.10                 # 총 자산의 10%
  max_positions: 2                 # 소액이라 최대 2종목으로 제한
  min_fund_score: 55.0             # 펀더멘털 최소 점수 (0~100)
  min_safety_margin_pct: 10.0      # DCF 안전마진 최소 (%)
  stop_loss_pct: 0.08              # 손절 -8%
  take_profit_pct: 0.25            # 목표가 +25%
  rsi_entry_max: 70.0              # 진입 시 RSI 상한

# ── 버킷 2: ETF 스윙/장기/단기 ──────────────────────────────────────
# 초기 공격적 운용: 25%
etf_swing:
  watchlist_file: watchlists/etf_symbols.txt
  bucket_pct: 0.40                 # 총 자산의 40% (갭없는 날 수익 커버)
  max_positions: 3
  timeframe: auto                  # auto / short / swing / long
  short_tp_pct: 0.03               # 단기 목표 +3%
  short_sl_pct: 0.02               # 단기 손절 -2%
  swing_tp_pct: 0.08               # 스윙 목표 +8%
  swing_sl_pct: 0.04               # 스윙 손절 -4%
  long_tp_pct: 0.20                # 장기 목표 +20%
  long_sl_pct: 0.08                # 장기 손절 -8%
  min_volume_ratio: 0.5            # 거래량 최소 비율 (20일 평균 대비)

# ── 버킷 3: 스퀴즈 + 급등 초단타 ────────────────────────────────────
# 초기 공격적 운용: 65% (핵심 성장 엔진)
# Cash 계좌 T+1 → 하루 1종목 집중 운용
#
# 분할 청산 스케줄:
#   +20% 도달 → 잔량의 25% 청산 (1차)
#   +40% 도달 → 잔량의 33% 청산 (2차)
#   +80% 도달 → 잔량의 50% 청산 (3차)
#   이후       → ATR 트레일링으로 잔량 추적
squeeze:
  watchlist_file: watchlists/symbols.txt
  bucket_pct: 0.50                 # 총 자산의 50%
  max_positions: 3                 # $7,400 → 풀 2~3개 분할 운용
  # ── 프리마켓 갭업 스캐너 기준 ────────────────────────────────────
  # 실증 데이터: 진짜 급등주 갭업 평균 47%, RVOL 평균 26.7x
  min_gap_pct: 20.0                # 최소 갭업 20% (4% 이상이면 Gap&Go 후보)
  min_rvol: 5.0                    # 프리마켓 최소 RVOL 5x
  min_rvol_intraday: 10.0          # 장중 진입 최소 RVOL 10x
  max_float_m: 50.0                # 최대 Float 5000만주 (소형주 위주)
  min_short_pct: 15.0              # 숏스퀴즈 후보 최소 숏비율 15%
  min_days_to_cover: 3.0           # 최소 Days to Cover
  # ── TTM 스퀴즈 (일봉/주봉) 거래량 기준 ──────────────────────────
  min_volume_ratio: 3.0            # TTM 스퀴즈 거래량 기준 3배
  # ── 청산 전략: 매수세가 죽을 때까지 보유 ─────────────────────────
  # 기계적 분할(25%@+20%, 33%@+40%, 50%@+80%) → 5배 급등 시 수익 +130% (나쁨)
  # 분배 감지 후 ATR 트레일링 → 5배 급등 시 수익 +350%+ (좋음)
  partial_exits_enabled: false     # 기계적 % 분할 비활성화 (true 시 복구)
  distribution_exit_ratio: 0.50   # 분배(distribution) 감지 시 잔량 50% 청산
  # ATR 기반 트레일링 (SOUN +33% 단일봉, MSTR +46% 단일봉 → 고정 8% 스탑은 매일 털림)
  atr_multiplier: 3.0              # 초기 진입 손절: ATR×3 (충분한 변동성 허용)
  breakeven_trigger_pct: 0.15      # +15% 도달 시 손절선 손익분기점으로 이동
  scalp_tp_pct: 0.20               # 눌림목 스캘핑 목표 +20%
  scalp_sl_pct: 0.05               # 스캘핑 손절 -5%
  scalp_pullback_pct: 0.03         # 스캘핑 재진입 눌림목 기준 -3%

budgets:
  momentum_bucket_usd: 3000000
  momentum_max_positions: 3
  value_bucket_usd: 17000000
  value_max_positions: 8

momentum_rules:
  lookback_minutes: 120
  min_intraday_change_pct: 5.0
  vol_spike_ratio: 2.0
  min_price_usd: 3.0
  rsi_entry_max: 75.0              # 진입 시 RSI 상한 (과매수 추격 방지)
  require_macd_positive: true      # MACD 히스토그램 > 0 필수

value_rules:
  max_market_cap_usd: 5000000000
  max_per_vs_group: 0.7
  min_eps_growth: 0.10
  min_liquidity_usd: 1000000
  rsi_entry_threshold: 40          # 진입 시 RSI 상한 (과매수 제외)

news:
  use_alpaca_news: true
  lookback_hours: 24
  positive_keywords: ["beat","approval","partnership","guidance raise","contract","award","upgrade","FDA","acquisition"]
  hold_extension_days: 10

sector:
  max_positions_per_sector: 3      # 동일 섹터 최대 포지션 수

storage:
  db_path: "storage/trade.db"
